services:
  - type: web
    name: thao-duoc-huong-vu
    env: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: ADMIN_SESSION_HOURS
        value: "8"
      - key: TELEGRAM_NOTIFY_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
